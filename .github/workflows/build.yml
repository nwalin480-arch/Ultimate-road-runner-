name: Build & Sign APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/road-runner-release.keystore \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            -dname "CN=Rock City, OU=Games, O=Rock City, L=City, S=State, C=US"

      - name: Save keystore as artifact (keep for Play Store updates)
        uses: actions/upload-artifact@v4
        with:
          name: road-runner-keystore
          path: android/app/road-runner-release.keystore
          retention-days: 90

      - name: Copy game files into Android assets
        run: |
          mkdir -p android/app/src/main/assets/game
          cp index.html android/app/src/main/assets/game/
          cp -r game-files/. android/app/src/main/assets/game/

      - name: Build Release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Align and Sign APK
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -v -p 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            android/app/build/outputs/apk/release/app-release-aligned.apk

          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks android/app/road-runner-release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out android/app/build/outputs/apk/release/UltimateRoadRunner-release.apk \
            android/app/build/outputs/apk/release/app-release-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UltimateRoadRunner-Release
          path: android/app/build/outputs/apk/release/UltimateRoadRunner-release.apk
