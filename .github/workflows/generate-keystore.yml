name: 🔑 Generate Keystore (Run Once)

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: 'Choose a strong password for your keystore'
        required: true
      key_password:
        description: 'Choose a strong password for your key (can be same as above)'
        required: true
      developer_name:
        description: 'Your name or studio name'
        required: true
        default: 'Rock City'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      secrets: write

    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore urr-release.keystore \
            -alias urr-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=${{ github.event.inputs.developer_name }}, OU=Games, O=${{ github.event.inputs.developer_name }}, L=City, S=State, C=US"

      - name: Set secrets automatically via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEYSTORE_B64=$(base64 -w 0 urr-release.keystore)

          # Get repo public key for secret encryption
          PUB_KEY=$(gh api repos/${{ github.repository }}/actions/secrets/public-key)
          KEY_ID=$(echo $PUB_KEY | jq -r '.key_id')
          PUB_KEY_VAL=$(echo $PUB_KEY | jq -r '.key')

          # Install sodium for encryption
          pip install PyNaCl -q

          python3 << PYEOF
          import base64
          from nacl import encoding, public
          import json, subprocess

          pub_key = "$PUB_KEY_VAL"
          key_id = "$KEY_ID"
          token = "$GH_TOKEN"
          repo = "${{ github.repository }}"

          def encrypt(pub_key: str, secret_value: str) -> str:
              pub_key_bytes = base64.b64decode(pub_key)
              sealed_box = public.SealedBox(public.PublicKey(pub_key_bytes))
              encrypted = sealed_box.encrypt(secret_value.encode("utf-8"))
              return base64.b64encode(encrypted).decode("utf-8")

          secrets = {
              "KEYSTORE_BASE64": "$KEYSTORE_B64",
              "KEYSTORE_PASSWORD": "${{ github.event.inputs.store_password }}",
              "KEY_ALIAS": "urr-key",
              "KEY_PASSWORD": "${{ github.event.inputs.key_password }}"
          }

          import urllib.request
          for name, value in secrets.items():
              encrypted = encrypt(pub_key, value)
              data = json.dumps({"encrypted_value": encrypted, "key_id": key_id}).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/actions/secrets/{name}",
                  data=data, method="PUT",
                  headers={
                      "Authorization": f"token {token}",
                      "Accept": "application/vnd.github.v3+json",
                      "Content-Type": "application/json"
                  }
              )
              urllib.request.urlopen(req)
              print(f"✅ Set secret: {name}")
          PYEOF

      - name: Done
        run: |
          echo "✅ All 4 secrets set successfully!"
          echo "The build workflow will now trigger automatically."
