name: 🔑 Generate Keystore (Run Once)

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: 'Keystore password'
        required: true
      key_password:
        description: 'Key password (can be same as above)'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore road-runner-release.keystore \
            -alias road-runner-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=Rock City, OU=Games, O=Rock City, L=City, S=State, C=US"

      - name: Convert to base64
        run: |
          base64 -w 0 road-runner-release.keystore > keystore-base64.txt
          echo ""
          echo "====== KEYSTORE BASE64 BELOW ======"
          cat keystore-base64.txt
          echo ""
          echo "====== KEYSTORE BASE64 ABOVE ======"

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: road-runner-keystore
          path: |
            road-runner-release.keystore
            keystore-base64.txt
          retention-days: 7
